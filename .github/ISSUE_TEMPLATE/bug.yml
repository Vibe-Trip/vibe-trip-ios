name: Bug
description: 버그 발생
title: "[Bug] "
labels: ["bug"]

body:
  - type: textarea
    attributes:
      label: 📄 설명
      description: 발생한 버그에 대해 작성해주세요.
      placeholder: 자세히 적을수록 좋습니다.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔁 재현 방법
      description: 버그를 재현하는 단계를 작성해주세요.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 기대 동작
      description: 버그가 없었다면 어떻게 동작했어야 하는지 작성해주세요.
      placeholder: ex) 로그인 버튼 탭 시 홈 화면으로 이동해야 한다.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🖼️ 첨부 자료
      description: 문제를 보여주는 사진이나 로그 정보 등이 있다면 작성해주세요.
      placeholder: ex) 코드, 로그, 모니터링 결과 등
